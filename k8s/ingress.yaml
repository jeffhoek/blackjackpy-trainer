apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blackjack-trainer
  namespace: blackjack
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # ALB idle timeout must exceed WS_IDLE_TIMEOUT (300s) to avoid mid-session drops
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=600
    # Sticky sessions: each browser client routes to the same pod (required for WebSocket)
    alb.ingress.kubernetes.io/target-group-attributes: >-
      stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=86400
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blackjack-trainer
                port:
                  number: 80
